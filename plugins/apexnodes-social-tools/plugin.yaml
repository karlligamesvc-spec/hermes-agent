name: apexnodes-social-tools
version: "0.4.0"
description: "Cross-platform social data tools (10-platform whitelist). P1 gateway mode (default) calls the ApexNodes tools gateway /tools/v1/social/{platform}/{action}; legacy master data-gateway path kept behind TOOLS_GATEWAY_DISABLED=1 (cloud rollback channel)."
provides_tools:
  - social_content
  - social_search
  - social_profile
  - social_comments
  - social_trending
  - social_posts
  - social_captions
  - creator_top_posts
