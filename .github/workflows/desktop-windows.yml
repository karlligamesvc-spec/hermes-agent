name: Build ApexNodes Desktop (Windows)

# Builds the ApexNodes Electron desktop app (apps/desktop) for Windows on a
# native windows-latest runner: dist:win -> unsigned NSIS/MSI installer, uploaded
# as a build artifact. This is the Windows counterpart to the Mac dmg (both are
# apps/desktop).
#
# Deliberately SEPARATE from build-windows-installer.yml, which builds the
# upstream Tauri "Hermes-Setup.exe" (Azure-signed, admin-only) — a different
# artifact for a different purpose. No code signing here, matching the unsigned
# Mac dmg for V0.1 (signing is a V0.2 item). Native windows-latest avoids the
# Mac cross-build pitfalls (wrong node-pty binary, @electron/get download hangs).

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # hc-532 (gate 2): read-only, credential-free shell↔engine contract闸 — the
  # Windows counterpart of the same job in desktop-macos.yml. Runs on a cheap
  # ubuntu runner BEFORE the build; `build` needs it, so a fail aborts the
  # release. Probes live prod (/api/v1/runtime/latest + HEAD the default engine
  # tarball) and asserts the default engine is not behind this shell's declared
  # minEngineVersion (A-10 guard) and its min_desktop_version is not ahead of the
  # shell being cut (hc-475 axis). No secrets, no npm ci — pure node built-ins.
  preflight:
    name: Release preflight (shell↔engine contract)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4
        with:
          node-version: 22
      - name: Assert shell↔engine release contract
        working-directory: apps/desktop
        run: node scripts/assert-release-preflight.cjs

  build:
    name: ApexNodes Windows installer (x64, unsigned)
    needs: preflight
    runs-on: windows-latest
    timeout-minutes: 75

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4
        with:
          node-version: 22
          cache: npm

      # Root install: apps/desktop's build asserts a root workspace install
      # (assert-root-install.cjs) and links @hermes/shared via the workspace.
      - name: Install dependencies (root workspaces)
        run: npm ci

      # dist:win = build (write-build-stamp + stage-install-script +
      # stage-native-deps[stages win32 node-pty natively on this host] + tsc +
      # vite) then electron-builder --win. The local node_modules/electron/dist
      # is the Windows electron on this runner, so the builder wrapper's
      # electronDist override resolves to the correct binary. Unsigned: no CSC_*
      # or Azure secrets (CSC_IDENTITY_AUTO_DISCOVERY=false; the build config
      # already sets signAndEditExecutable:false so no wine/rcedit is needed).
      # --publish never: build.publish (generic COS feed) makes electron-builder
      # emit latest.yml + the exe blockmap for electron-updater; the COS step
      # below uploads them (generic providers can't be published to directly).
      - name: Build Windows installer (unsigned)
        working-directory: apps/desktop
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
        run: npm run dist:win -- --publish never

      # hc-436: symmetric updater-deps integrity gate. The Mac workflow already
      # verified electron-updater survived into the packaged Resources; Windows
      # staged the identical 16-package closure with NO gate, so a win-only stage
      # breakage (the hc-435 failure mode: require('electron-updater') throws ->
      # self-update silently disabled) would ship undetected. The same Node gate
      # both platforms call reads the closure manifest stage-updater-deps.cjs
      # emits and asserts every staged package landed under win-unpacked/resources.
      # electron-builder unpacks the app next to the installer as win-unpacked/,
      # whose resources/ dir carries the extraResources updater-deps subtree.
      - name: Assert packaged updater-deps integrity
        working-directory: apps/desktop
        run: node scripts/assert-updater-deps.cjs release/win-unpacked/resources

      - name: List build output
        if: always()
        working-directory: apps/desktop
        run: Get-ChildItem release

      - name: Upload installer artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: apexnodes-desktop-windows
          path: |
            apps/desktop/release/*.exe
            apps/desktop/release/*.msi
          if-no-files-found: error

      # Publish the installer + electron-updater feed straight to Tencent COS
      # from the runner (fast GH -> COS link), so we never pull the ~235 MB
      # artifact down a slow link. Gated on the COS_* repo secrets: skips
      # cleanly when unset (the artifact above is still produced as a
      # fallback). 0.16.1+: original electron-builder names (no lowercasing —
      # latest.yml references the exe by its exact name) under desktop/win-x64/,
      # mirroring the per-arch mac prefixes (desktop/mac-<arch>/); the shell
      # updater polls this prefix (electron/shell-updater.cjs).
      #
      # hc-435: the ROOT desktop/latest.yml is INTENTIONALLY empty (404). The
      # installed shell reads desktop/win-x64/ via runtime setFeedURL, not the
      # root — do not add a root copy to "fix" the 404 (it would just mirror the
      # per-arch mac clobber hazard). Verified the shipped win-x64 feed + exe
      # both resolve (HTTP 200).
      - name: Publish installer + updater feed to Tencent COS
        if: success()
        shell: pwsh
        env:
          COS_SECRET_ID: ${{ secrets.COS_SECRET_ID }}
          COS_SECRET_KEY: ${{ secrets.COS_SECRET_KEY }}
        run: |
          if (-not $env:COS_SECRET_ID -or -not $env:COS_SECRET_KEY) {
            Write-Host "COS_SECRET_ID/COS_SECRET_KEY not set; skipping COS publish (artifact still uploaded)."
            exit 0
          }
          $ErrorActionPreference = "Stop"
          Invoke-WebRequest -Uri "https://github.com/tencentyun/coscli/releases/download/v1.0.8/coscli-v1.0.8-windows-amd64.exe" -OutFile coscli.exe
          $cfg = @(
            "cos:",
            "  base:",
            "    protocol: https",
            "    secretid: $env:COS_SECRET_ID",
            "    secretkey: $env:COS_SECRET_KEY",
            "  buckets:",
            "  - name: apexnodes-runtime-202606250443-1300912302",
            "    alias: apexnodes-runtime",
            "    region: ap-guangzhou",
            "    endpoint: cos.ap-guangzhou.myqcloud.com"
          )
          Set-Content -Path (Join-Path $env:USERPROFILE ".cos.yaml") -Value $cfg -Encoding ascii
          $release = "apps/desktop/release"
          $files = @(Get-ChildItem "$release/*.exe") +
                   @(Get-ChildItem "$release/*.blockmap" -ErrorAction SilentlyContinue) +
                   @(Get-ChildItem "$release/latest.yml" -ErrorAction SilentlyContinue)
          if (-not ($files | Where-Object { $_.Extension -eq ".exe" })) { throw "no .exe found under $release" }
          if (-not ($files | Where-Object { $_.Name -eq "latest.yml" })) { throw "latest.yml missing under $release (updater feed would be dead)" }
          $prefix = "desktop/win-x64"
          foreach ($f in $files) {
            ./coscli.exe cp $f.FullName "cos://apexnodes-runtime-202606250443-1300912302/$prefix/$($f.Name)"
            Write-Host "COS publish OK: $prefix/$($f.Name)"
          }
          Remove-Item (Join-Path $env:USERPROFILE ".cos.yaml") -Force
