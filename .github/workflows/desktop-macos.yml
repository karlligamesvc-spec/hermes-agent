# Signed + notarized macOS DMGs on a hosted (US) runner. Local mainland-CN
# builds fail intermittently on Apple's timestamp service during codesign, so
# release builds run here — same pattern as desktop-windows.yml, plus
# Developer ID signing and notarization fed from repo secrets.
#
# Required repo secrets:
#   MAC_CERT_P12_BASE64   base64 -i <Developer ID Application>.p12
#   MAC_CERT_PASSWORD     password of that .p12
#   APPLE_API_KEY         App Store Connect API key .p8 CONTENT (BEGIN PRIVATE KEY…)
#   APPLE_API_KEY_ID      key id, e.g. 279K2XSRWL
#   APPLE_API_ISSUER      issuer UUID (App Store Connect → Users and Access → Keys)
#   COS_SECRET_ID/KEY     optional, already set for desktop-windows → COS publish
#
# Publishes the electron-builder artifacts UNDER THEIR ORIGINAL NAMES
# (APEX-<version>-mac-<arch>.dmg/.zip + *.blockmap + latest-mac.yml) to
# desktop/mac-<arch>/ on the public bucket — the electron-updater generic feed
# the desktop shell polls (electron/shell-updater.cjs). Per-arch prefixes are
# load-bearing: both matrix jobs emit a file literally named latest-mac.yml,
# so a flat desktop/ prefix would let the second job clobber the first arch's
# feed. (≤0.16.0 used lowercased custom names; website links are synced from
# the cloud repo separately.)
#
# hc-435 — DO NOT "fix" the 404 at the ROOT desktop/latest-mac.yml by also
# uploading there. The root feed is INTENTIONALLY empty: the installed shell
# reads its per-arch subdir via runtime setFeedURL (shell-updater.cjs), never
# the root. Copying arm64 + x64 latest-mac.yml to the flat desktop/ prefix is
# exactly the clobber this per-arch layout exists to avoid — the second arch's
# yml would overwrite the first's, and its updater would find no matching zip.
# The root 404 is expected and harmless; verified end-to-end that every shipped
# arch resolves its subdir feed + installer (both HTTP 200).

name: Desktop macOS build

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # hc-532 (gate 2): read-only, credential-free shell↔engine contract闸. Runs on
  # a cheap ubuntu runner BEFORE the signed build; `build` needs it, so a fail
  # here aborts the whole release. Probes live prod (/api/v1/runtime/latest +
  # HEAD the default engine tarball) and asserts the default engine is not behind
  # this shell's declared minEngineVersion (A-10 guard) and its min_desktop_version
  # is not ahead of the shell being cut (hc-475 axis). No secrets, no npm ci — the
  # script is pure node built-ins + the shared compareSemver module.
  preflight:
    name: Release preflight (shell↔engine contract)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4
        with:
          node-version: 22
      - name: Assert shell↔engine release contract
        working-directory: apps/desktop
        run: node scripts/assert-release-preflight.cjs

  build:
    name: APEX macOS installer (${{ matrix.arch }}, signed)
    needs: preflight
    runs-on: macos-14
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        arch: [arm64, x64]

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4
        with:
          node-version: 22
          cache: npm

      # Root install: apps/desktop's build asserts a root workspace install
      # (assert-root-install.cjs) and links @hermes/shared via the workspace.
      - name: Install dependencies (root workspaces)
        run: npm ci

      - name: Import Developer ID certificate
        env:
          MAC_CERT_P12_BASE64: ${{ secrets.MAC_CERT_P12_BASE64 }}
          MAC_CERT_PASSWORD: ${{ secrets.MAC_CERT_PASSWORD }}
        run: |
          set -euo pipefail
          if [ -z "$MAC_CERT_P12_BASE64" ]; then
            echo "MAC_CERT_P12_BASE64 secret is not set" >&2; exit 1
          fi
          KEYCHAIN="$RUNNER_TEMP/build.keychain-db"
          KEYCHAIN_PASS="$(openssl rand -hex 16)"
          echo "$MAC_CERT_P12_BASE64" | base64 -d > "$RUNNER_TEMP/cert.p12"
          security create-keychain -p "$KEYCHAIN_PASS" "$KEYCHAIN"
          security set-keychain-settings -lut 3600 "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PASS" "$KEYCHAIN"
          security default-keychain -s "$KEYCHAIN"
          security import "$RUNNER_TEMP/cert.p12" -k "$KEYCHAIN" \
            -P "$MAC_CERT_PASSWORD" -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PASS" "$KEYCHAIN" > /dev/null
          rm -f "$RUNNER_TEMP/cert.p12"
          security find-identity -v -p codesigning "$KEYCHAIN"

      # electron-builder's BUILT-IN notarize step treats APPLE_API_KEY as a
      # FILE PATH; handing it the .p8 CONTENT makes notarytool parse the first
      # line (-----BEGIN PRIVATE KEY-----) as an option → "Invalid option".
      # Materialize the secret to a file and pass the path — our afterSign
      # (scripts/notarize.cjs) accepts a path too, so both layers agree.
      - name: Materialize App Store Connect API key (.p8)
        env:
          APPLE_API_KEY_CONTENT: ${{ secrets.APPLE_API_KEY }}
        run: |
          set -euo pipefail
          printf '%s\n' "$APPLE_API_KEY_CONTENT" > "$RUNNER_TEMP/AuthKey.p8"
          chmod 600 "$RUNNER_TEMP/AuthKey.p8"
          head -c 27 "$RUNNER_TEMP/AuthKey.p8" | grep -q "BEGIN PRIVATE KEY" || head -2 "$RUNNER_TEMP/AuthKey.p8" | grep -q "BEGIN PRIVATE KEY" || { echo "APPLE_API_KEY secret does not look like a .p8"; exit 1; }

      # `npm run build` = assert-icon/root-install + write-build-stamp +
      # stage-install-script + stage-native-deps + tsc + vite build — the
      # renderer/dist, install-stamp.json and native-deps that electron-builder
      # packs. `npm run builder` alone does NOT run it: on a clean runner that
      # shipped an asar with NO dist/index.html (white screen on launch, caught
      # 2026-07-05). afterSign (scripts/notarize.cjs) submits to notarytool and
      # staples; without the APPLE_* secrets it logs and skips (stays signed).
      - name: Build, sign and notarize (${{ matrix.arch }})
        working-directory: apps/desktop
        env:
          APPLE_API_KEY: ${{ runner.temp }}/AuthKey.p8
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
        # npm run build 先行(dist/stamp/native-deps,白屏防线);--publish never:
        # build.publish (generic COS feed) 存在使 electron-builder 产出
        # latest-mac.yml + *.blockmap,但不从这里上传(generic provider 本就
        # 不支持推送——下方 COS 步用 coscmd 上传全家桶)。
        run: npm run build && npm run builder -- --mac dmg zip --${{ matrix.arch }} --publish never

      # Packaged-content gate: electron-builder happily packs an asar missing
      # the renderer (it does not validate inputs), which ships as a white
      # screen. Fail loud if dist/index.html or install-stamp.json is absent.
      - name: Assert packaged asar completeness
        working-directory: apps/desktop
        run: |
          set -euo pipefail
          APP="$(find release/mac* -maxdepth 1 -name '*.app' | head -1)"
          RES="$APP/Contents/Resources"
          npx --yes @electron/asar list "$RES/app.asar" > /tmp/asar-list.txt
          grep -qx "/dist/index.html" /tmp/asar-list.txt || { echo "::error::app.asar missing /dist/index.html — refusing to ship a white-screen build"; exit 1; }
          # These ship via extraResources NEXT TO the asar, not inside it.
          [ -f "$RES/install-stamp.json" ] || { echo "::error::Resources/install-stamp.json missing — bootstrap would have no pinned ref"; exit 1; }
          [ -d "$RES/native-deps" ] || { echo "::error::Resources/native-deps missing — node-pty would fail to load"; exit 1; }
          # hc-435: electron-updater is NOT in the asar (files: white-list +
          # beforeBuild:false skip electron-builder's node_modules collector),
          # so it ships staged under extraResources. Its absence silently
          # disabled shell self-update from 0.16.1 (require threw "Cannot find
          # module 'electron-updater'"). hc-436: the shared cross-platform gate
          # (also run by desktop-windows.yml) verifies the WHOLE staged closure
          # against stage-updater-deps.cjs's manifest, not just the entry file —
          # so a dropped transitive dep can never ship a no-op updater either.
          node scripts/assert-updater-deps.cjs "$RES"
          echo "package completeness OK ($(wc -l < /tmp/asar-list.txt) asar entries)"

      - name: Gatekeeper assessment (fails if not notarized)
        working-directory: apps/desktop
        run: |
          set -euo pipefail
          APP="$(find release/mac* -maxdepth 1 -name '*.app' | head -1)"
          codesign -dv --verbose=2 "$APP" 2>&1 | grep -E "Authority=Developer ID|TeamIdentifier"
          spctl --assess --type execute -v "$APP" || {
            echo "::warning::spctl assessment failed — DMG is signed but likely NOT notarized"; exit 0; }

      - name: List build output
        if: always()
        working-directory: apps/desktop
        run: ls -lh release/*.dmg release/*.zip release/*.blockmap release/latest-mac.yml 2>/dev/null || true

      - name: Upload installer artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: apexnodes-desktop-macos-${{ matrix.arch }}
          path: |
            apps/desktop/release/*.dmg
            apps/desktop/release/*.zip

      # Installer + electron-updater feed, original electron-builder names, one
      # per-arch prefix per matrix job (see the header comment for why flat
      # desktop/ would clobber latest-mac.yml across arches).
      - name: Publish installer + updater feed to COS (skipped when secrets absent)
        env:
          COS_SECRET_ID: ${{ secrets.COS_SECRET_ID }}
          COS_SECRET_KEY: ${{ secrets.COS_SECRET_KEY }}
        run: |
          set -euo pipefail
          if [ -z "$COS_SECRET_ID" ] || [ -z "$COS_SECRET_KEY" ]; then
            echo "COS_SECRET_ID/COS_SECRET_KEY not set; skipping COS publish (artifact still uploaded)."
            exit 0
          fi
          pip3 install --quiet --break-system-packages coscmd
          coscmd config -a "$COS_SECRET_ID" -s "$COS_SECRET_KEY" \
            -b apexnodes-runtime-202606250443-1300912302 -r ap-guangzhou
          PREFIX="desktop/mac-${{ matrix.arch }}"
          cd apps/desktop/release
          # latest-mac.yml must exist — without it the updater feed is dead.
          [ -f latest-mac.yml ] || { echo "latest-mac.yml missing in release/" >&2; exit 1; }
          for f in *.dmg *.zip *.blockmap latest-mac.yml; do
            [ -e "$f" ] || continue
            coscmd upload "$f" "$PREFIX/$f"
            echo "COS publish OK: $PREFIX/$f"
          done
